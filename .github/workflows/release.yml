name: Release

# Trigger on version tags
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # ── Build and test ──────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Build and test
        run: make check

  # ── Debian .deb packages ────────────────────────────────────────
  deb:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y debhelper dpkg-dev

      - name: Build .deb packages
        run: dpkg-buildpackage -us -uc -b

      - name: Upload .deb artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deb-packages
          path: |
            ../*.deb
            ../*.changes

  # ── Alpine .apk packages ───────────────────────────────────────
  apk:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build .apk in Alpine container
        run: |
          docker run --rm \
            -v "$PWD":/src \
            -w /src \
            alpine:latest sh -c '
              set -e
              apk add --no-cache build-base cmake abuild

              # Set up abuild signing key (ephemeral, CI-only)
              mkdir -p /root/.abuild
              abuild-keygen -a -i -n

              # Copy APKBUILD to a workspace
              mkdir -p /tmp/build
              cp packaging/alpine/APKBUILD /tmp/build/

              # Create source tarball from current checkout
              VERSION=$(grep "^pkgver=" packaging/alpine/APKBUILD | cut -d= -f2)
              TARBALL="libutf8-${VERSION}.tar.gz"
              tar czf "/tmp/build/${TARBALL}" \
                --transform "s,^,utf8-${VERSION}/," \
                --exclude=.git --exclude=build --exclude=bin \
                .

              # Update APKBUILD checksums and build
              cd /tmp/build
              sed -i "s|https://github.com/.*|/tmp/build/${TARBALL}\"|" APKBUILD
              abuild checksum
              abuild -F -r

              # Copy packages out
              cp /root/packages/tmp/build/$(uname -m)/*.apk /src/
            '

      - name: Upload .apk artifacts
        uses: actions/upload-artifact@v4
        with:
          name: apk-packages
          path: '*.apk'

  # ── Windows build (CMake) ───────────────────────────────────────
  windows:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure and build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release

      - name: Package
        run: cmake --install build --config Release --prefix install

      - name: Create zip
        run: Compress-Archive -Path install\* -DestinationPath libutf8-windows-x64.zip

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-package
          path: libutf8-windows-x64.zip

  # ── GitHub Release ──────────────────────────────────────────────
  release:
    needs: [deb, apk, windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Compute source tarball sha256
        id: sha
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          URL="https://github.com/${{ github.repository }}/archive/refs/tags/${TAG}.tar.gz"
          SHA=$(curl -sL "$URL" | sha256sum | cut -d' ' -f1)
          echo "sha256=${SHA}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Install

            **Source tarball sha256:** `${{ steps.sha.outputs.sha256 }}`

            ### Debian / Ubuntu
            ```sh
            sudo dpkg -i libutf8-1_*.deb libutf8-dev_*.deb
            ```

            ### Homebrew
            ```sh
            brew tap wmacevoy/utf8
            brew install utf8
            ```

            ### Alpine
            ```sh
            apk add --allow-untrusted libutf8-*.apk
            ```

            ### From source
            ```sh
            make && sudo make install
            # or
            cmake -B build && cmake --build build && sudo cmake --install build
            ```
          files: |
            artifacts/deb-packages/*.deb
            artifacts/apk-packages/*.apk
            artifacts/windows-package/*.zip

  # ── Publish apt repo to GitHub Pages ────────────────────────────
  #
  # This creates a minimal apt repository served via GitHub Pages.
  # Users add it with:
  #
  #   echo "deb [signed-by=/usr/share/keyrings/utf8.gpg] \
  #     https://wmacevoy.github.io/utf8/apt stable main" \
  #     | sudo tee /etc/apt/sources.list.d/utf8.list
  #
  # Prerequisites:
  #   1. Enable GitHub Pages (Settings > Pages > Source: GitHub Actions)
  #   2. Create a GPG key and add the private key as the repository
  #      secret GPG_PRIVATE_KEY:
  #
  #        gpg --batch --gen-key <<EOF
  #        %no-protection
  #        Key-Type: RSA
  #        Key-Length: 4096
  #        Name-Real: libutf8 repo signing key
  #        Name-Email: wmacevoy@gmail.com
  #        Expire-Date: 0
  #        EOF
  #
  #        gpg --armor --export-secret-keys > private.key
  #        # Paste contents of private.key as the GPG_PRIVATE_KEY secret
  #        gpg --armor --export > apt/utf8.gpg
  #        # Commit utf8.gpg to the repo so users can download it
  #
  apt-repo:
    needs: release
    runs-on: ubuntu-latest
    if: ${{ vars.ENABLE_APT_REPO == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - name: Download .deb artifacts
        uses: actions/download-artifact@v4
        with:
          name: deb-packages
          path: debs

      - name: Install reprepro
        run: sudo apt-get update && sudo apt-get install -y reprepro

      - name: Import GPG key
        run: echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import

      - name: Get GPG key ID
        id: gpg
        run: echo "keyid=$(gpg --list-secret-keys --keyid-format long | grep sec | awk '{print $2}' | cut -d/ -f2)" >> "$GITHUB_OUTPUT"

      - name: Build apt repository
        run: |
          mkdir -p apt/conf
          cat > apt/conf/distributions <<CONF
          Origin: wmacevoy
          Label: libutf8
          Codename: stable
          Architectures: amd64 arm64 i386
          Components: main
          SignWith: ${{ steps.gpg.outputs.keyid }}
          CONF

          for deb in debs/*.deb; do
            reprepro -b apt includedeb stable "$deb"
          done

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apt

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
